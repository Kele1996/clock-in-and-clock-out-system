<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
    <title>Employee Management System</title>
  </head>

  <body>
    <div class="employee-management-system">
      <h1>Employee Clocking System</h1>

      <input type="text" id="employee-id" placeholder="Enter Employee Number" />

      <br /><br />

      <button id="clock-in-btn">Clock In</button>
      <button id="clock-out-btn">Clock Out</button>
      <button id="red-list">Red List</button>
      <button id="attendance-register">Attendance Register</button>

      <p id="message"></p>
    </div>
  </body>
</html>
